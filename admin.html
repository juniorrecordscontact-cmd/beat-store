<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
.section{margin-top:25px;border-top:1px solid #333;padding-top:15px;}
.beatRow{border:1px solid #333;margin:10px;padding:10px;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<div id="panel">

<!-- SETTINGS -->
<div class="section">
<h2>🏪 Store Settings</h2>
<input id="storeName" placeholder="Store Name"><br>
<input id="background" placeholder="Background URL"><br>
<input id="font" placeholder="Font"><br>
<button onclick="saveSettings()">SAVE</button>
</div>

<!-- UPLOAD -->
<div class="section">
<h2>🎧 Upload Beat (Exclusive WAV)</h2>

<input id="title" placeholder="Title"><br>
<input id="image" placeholder="Image URL"><br>
<input id="bgColor" type="color"><br>

<input id="preview" placeholder="Preview MP3 URL"><br>
<input id="wav" placeholder="WAV URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>
<input id="price" placeholder="Price"><br>

<button onclick="addBeat()">UPLOAD</button>
<button onclick="updateBeat()">UPDATE</button>
<button onclick="deleteBeat()">DELETE</button>

<p id="status"></p>
</div>

<!-- SEED BUTTON -->
<div class="section">
<h2>🔥 Database Setup</h2>
<button onclick="seedBeats()">SEED DATABASE</button>
</div>

<!-- LIST -->
<div class="section">
<h2>📀 Beats</h2>
<div id="beatList"></div>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let selectedId=null;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
loadBeats();
});
}

/* SAVE SETTINGS */
function saveSettings(){
db.collection("settings").doc("site").set({
storeName:storeName.value,
background:background.value,
font:font.value
});
}

/* ADD BEAT */
function addBeat(){
db.collection("beats").add({
title:title.value,
image:image.value,
bgColor:bgColor.value || "#000",
previewFile:preview.value,
wavFile:wav.value,
buyLink:buyLink.value,
price:Number(price.value),
createdAt:Date.now()
});

status.innerText="Uploaded ✔";
loadBeats();
}

/* UPDATE */
function updateBeat(){
if(!selectedId) return alert("Select beat");

db.collection("beats").doc(selectedId).update({
title:title.value,
image:image.value,
bgColor:bgColor.value,
previewFile:preview.value,
wavFile:wav.value,
buyLink:buyLink.value,
price:Number(price.value)
});

status.innerText="Updated ✔";
loadBeats();
}

/* DELETE */
function deleteBeat(){
if(!selectedId) return alert("Select beat");

db.collection("beats").doc(selectedId).delete();
selectedId=null;
loadBeats();
}

/* LOAD */
function loadBeats(){
beatList.innerHTML="";

db.collection("beats").get().then(snap=>{
snap.forEach(doc=>{
let b=doc.data();

beatList.innerHTML+=`
<div class="beatRow">
<b>${b.title}</b> - $${b.price}
<br>
<button onclick="selectBeat('${doc.id}')">SELECT</button>
</div>`;
});
});
}

/* SELECT */
function selectBeat(id){
selectedId=id;

db.collection("beats").doc(id).get().then(doc=>{
let b=doc.data();

title.value=b.title;
image.value=b.image;
bgColor.value=b.bgColor;
preview.value=b.previewFile;
wav.value=b.wavFile;
buyLink.value=b.buyLink;
price.value=b.price;
});
}

/* SEED DATABASE */
function seedBeats(){

db.collection("beats").add({
title:"Dark Trap Exclusive",
image:"https://images.unsplash.com/photo-1511379938547-c1f69419868d",
bgColor:"#000000",
previewFile:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
wavFile:"https://example.com/wav1.wav",
buyLink:"https://paypal.me",
price:50,
createdAt:Date.now()
});

db.collection("beats").add({
title:"Piano Exclusive",
image:"https://images.unsplash.com/photo-1510915361894-db8b60106cb1",
bgColor:"#0a0a0a",
previewFile:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
wavFile:"https://example.com/wav2.wav",
buyLink:"https://paypal.me",
price:70,
createdAt:Date.now()
});

alert("Seeded ✔");
}
</script>

</body>
</html>
