<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border-radius:6px;border:none;}
button{background:#00c853;color:white;cursor:pointer;}
.section{border-top:1px solid #333;margin-top:25px;padding-top:20px;}
#panel{display:none;}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="loginBtn">LOGIN</button>
</div>

<div id="panel">

<div class="section">
<h2>🏪 Store Settings</h2>

<input id="storeName" placeholder="Store Name"><br>
<input id="font" placeholder="Font"><br>
<input id="background" placeholder="Background URL"><br>

<button id="saveSettingsBtn">SAVE SETTINGS</button>
<p id="settingsStatus"></p>
</div>

<div class="section">
<h2>🎧 Add Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="image" placeholder="Image URL"><br>
<input id="preview" placeholder="Preview URL"><br>
<input id="mp3" placeholder="MP3 URL"><br>
<input id="wav" placeholder="WAV URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>

<input id="mp3Price" placeholder="MP3 Price"><br>
<input id="wavPrice" placeholder="WAV Price"><br>
<input id="exclusivePrice" placeholder="Exclusive Price"><br>

<button id="addBeatBtn">ADD BEAT</button>
<p id="status"></p>
</div>

<div class="section">
<h2>✏ Edit Beat Price</h2>

<input id="editId" placeholder="Beat ID"><br>
<input id="newMp3" placeholder="New MP3 Price"><br>
<input id="newWav" placeholder="New WAV Price"><br>

<button id="updateBtn">UPDATE PRICE</button>
</div>

<div class="section">
<h2>🗑 Delete Beat</h2>

<input id="deleteId" placeholder="Beat ID"><br>
<button id="deleteBtn">DELETE</button>
</div>

<pre id="log" class="small"></pre>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function get(id){ return document.getElementById(id); }
function log(msg){ get("log").innerHTML += msg + "\n"; }

/* LOGIN */
get("loginBtn").onclick = async () => {
try{
await auth.signInWithEmailAndPassword(
get("email").value,
get("password").value
);

get("loginBox").style.display="none";
get("panel").style.display="block";

log("Login ✔");

}catch(e){
alert(e.message);
log(e.message);
}
};

/* SAVE SETTINGS */
get("saveSettingsBtn").onclick = async () => {
try{

await db.collection("settings").doc("site").set({
storeName:get("storeName").value || "Junior Beats",
font:get("font").value || "Arial",
background:get("background").value || ""
});

get("settingsStatus").innerText="Saved ✔";
log("Settings saved ✔");

}catch(e){
get("settingsStatus").innerText="Error ❌";
log(e.message);
}
};

/* ADD BEAT */
get("addBeatBtn").onclick = async () => {
try{

const data = {
title:get("title").value || "Untitled",
image:get("image").value || "",
previewFile:get("preview").value || "",
mp3File:get("mp3").value || "",
wavFile:get("wav").value || "",
buyLink:get("buyLink").value || "",
prices:{
mp3:get("mp3Price").value || "0",
wav:get("wavPrice").value || "0",
exclusive:get("exclusivePrice").value || "0"
},
createdAt:Date.now()
};

await db.collection("beats").add(data);

get("status").innerText="Beat added ✔";
log("Beat added ✔");

}catch(e){
get("status").innerText="Error ❌";
log(e.message);
}
};

/* UPDATE */
get("updateBtn").onclick = async () => {
try{

await db.collection("beats").doc(get("editId").value).update({
"prices.mp3":get("newMp3").value,
"prices.wav":get("newWav").value
});

alert("Updated ✔");
log("Price updated ✔");

}catch(e){
log(e.message);
}
};

/* DELETE */
get("deleteBtn").onclick = async () => {
try{

await db.collection("beats").doc(get("deleteId").value).delete();

alert("Deleted ✔");
log("Deleted ✔");

}catch(e){
log(e.message);
}
};
</script>

</body>
</html>
