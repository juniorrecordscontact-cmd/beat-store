<!DOCTYPE html>
<html>
<head>
  <title>Admin - Junior Beats</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 10px;
      background: #00c853;
      border: none;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .box {
      margin-top: 50px;
    }
  </style>
</head>

<body>

<h1>Admin Panel 🎛️</h1>

<div class="box">

  <input id="title" placeholder="Beat Name"><br>
  <input id="price" placeholder="Price"><br>
  <input id="file" placeholder="MP3 Link"><br>
  <input id="buyLink" placeholder="PayPal Link"><br>

  <button onclick="addBeat()">Add Beat</button>

</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
    authDomain: "junior-beats-store.firebaseapp.com",
    projectId: "junior-beats-store",
    storageBucket: "junior-beats-store.firebasestorage.app",
    messagingSenderId: "781170149321",
    appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addBeat() {
    db.collection("beats").add({
      title: document.getElementById("title").value,
      price: document.getElementById("price").value,
      file: document.getElementById("file").value,
      buyLink: document.getElementById("buyLink").value
    });

    alert("Beat added!");
  }
</script>

</body>
</html>
