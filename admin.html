<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:260px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛️ Admin Panel</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="panel">

<h2>🎧 Upload Beat</h2>

<input id="title" placeholder="Title"><br>

<input type="file" id="imageFile"><br>
<input type="file" id="previewFile"><br>
<input type="file" id="mp3File"><br>
<input type="file" id="wavFile"><br>

<input id="buyLink" placeholder="PayPal Link"><br>

<input id="mp3" placeholder="MP3 Price"><br>
<input id="wav" placeholder="WAV Price"><br>
<input id="exclusive" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">UPLOAD</button>

<p id="status"></p>

<hr>

<h2>🎨 Site Settings</h2>

<input id="bg" placeholder="Background Image URL"><br>
<input id="font" placeholder="Font (Arial, Courier, etc)"><br>

<button onclick="saveSettings()">Save Settings</button>

<p id="status2"></p>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain: "junior-beats-store.firebaseapp.com",
projectId: "junior-beats-store",
storageBucket: "junior-beats-store.firebasestorage.app",
messagingSenderId: "781170149321",
appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
})
.catch(e=>alert(e.message));
}

/* UPLOAD HELPER */
async function uploadFile(folder,file){
const ref = storage.ref(folder + "/" + Date.now() + "_" + file.name);
await ref.put(file);
return await ref.getDownloadURL();
}

/* ADD BEAT */
async function addBeat(){
try{

status.innerText = "Uploading...";

const image = imageFile.files[0];
const preview = previewFile.files[0];
const mp3 = mp3File.files[0];
const wav = wavFile.files[0];

if(!image || !preview || !mp3 || !wav){
status.innerText = "Missing files ❌";
return;
}

const imgURL = await uploadFile("images", image);
const prevURL = await uploadFile("preview", preview);
const mp3URL = await uploadFile("mp3", mp3);
const wavURL = await uploadFile("wav", wav);

await db.collection("beats").add({
title:title.value,
image:imgURL,
previewFile:prevURL,
mp3File:mp3URL,
wavFile:wavURL,
buyLink:buyLink.value,
exclusive:false,
licenses:{
mp3:mp3.value,
wav:wav.value,
exclusive:exclusive.value
}
});

status.innerText = "UPLOAD SUCCESS ✅";

}catch(e){
status.innerText = "ERROR: " + e.message;
}
}

/* SAVE SETTINGS */
function saveSettings(){
db.collection("settings").doc("site").set({
background: bg.value,
font: font.value
});
status2.innerText = "Saved 🎨";
}
</script>

</body>
</html>
