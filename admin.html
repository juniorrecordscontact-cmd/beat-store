<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
.section{margin-top:20px;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<div id="panel">

<div class="section">
<h2>🏪 Settings</h2>
<input id="storeName" placeholder="Store Name"><br>
<input id="background" placeholder="Background URL"><br>
<button onclick="saveSettings()">SAVE</button>
</div>

<div class="section">
<h2>🎧 Upload Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="image" placeholder="Image URL"><br>
<input id="preview" placeholder="Preview URL"><br>
<input id="wav" placeholder="WAV URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>
<input id="price" placeholder="Price"><br>

<button onclick="addBeat()">UPLOAD</button>
<p id="status"></p>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

function get(id){return document.getElementById(id);}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(get("email").value,get("password").value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
})
.catch(e=>alert(e.message));
}

/* SETTINGS */
function saveSettings(){
db.collection("settings").doc("site").set({
storeName:get("storeName").value,
background:get("background").value
}).catch(e=>alert(e.message));
}

/* ADD BEAT */
function addBeat(){
db.collection("beats").add({
title:get("title").value,
image:get("image").value,
previewFile:get("preview").value,
wavFile:get("wav").value,
buyLink:get("buyLink").value,
price:get("price").value,
createdAt:Date.now()
})
.then(()=>get("status").innerText="Uploaded ✔")
.catch(e=>get("status").innerText=e.message);
}
</script>

</body>
</html>
