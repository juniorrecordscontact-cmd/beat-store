<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

input {
  padding: 10px;
  margin: 8px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #00c853;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 10px;
}

#panel {
  display: none;
}
</style>
</head>

<body>

<h1>🎛️ Admin Login</h1>

<!-- LOGIN -->
<div id="login">
  <input id="user" placeholder="Username"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="panel">

  <h2>Upload Beats</h2>

  <input id="title" placeholder="Beat Title"><br>
  <input id="price" placeholder="Price"><br>
  <input id="file" placeholder="MP3 Link"><br>
  <input id="image" placeholder="Cover Image URL"><br>
  <input id="buyLink" placeholder="Buy Link"><br>

  <button onclick="addBeat()">Add Beat</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
  authDomain: "junior-beats-store.firebaseapp.com",
  projectId: "junior-beats-store",
  storageBucket: "junior-beats-store.firebasestorage.app",
  messagingSenderId: "781170149321",
  appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔐 SIMPLE LOGIN */
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "ADMIN" && pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong login ❌");
  }
}

/* ➕ ADD BEAT */
function addBeat() {
  db.collection("beats").add({
    title: title.value,
    price: price.value,
    file: file.value,
    image: image.value,
    buyLink: buyLink.value
  });

  alert("Beat added 🎧");

  title.value = "";
  price.value = "";
  file.value = "";
  image.value = "";
  buyLink.value = "";
}
</script>

</body>
</html>
