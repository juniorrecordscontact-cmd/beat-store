<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
.section{margin-top:20px;border-top:1px solid #333;padding-top:15px;}
#panel{display:none;}
small{color:#aaa;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin</h1>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<!-- PANEL -->
<div id="panel">

<div class="section">
<h2>🏪 Settings</h2>
<input id="storeName" placeholder="Store Name"><br>
<input id="background" placeholder="Background URL"><br>
<button onclick="saveSettings()">SAVE SETTINGS</button>
<p id="settingsStatus"></p>
</div>

<div class="section">
<h2>🎧 Add Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="image" placeholder="Image URL"><br>
<input id="preview" placeholder="Preview URL"><br>
<input id="wav" placeholder="WAV URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>
<input id="price" placeholder="Price"><br>

<button onclick="addBeat()">UPLOAD BEAT</button>
<p id="status"></p>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* SAFE GET */
const get = (id)=>document.getElementById(id);

/* LOGIN (FIXED ERROR HANDLING) */
function login(){
auth.signInWithEmailAndPassword(
get("email").value,
get("password").value
)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
console.log("LOGIN SUCCESS");
})
.catch(err=>{
alert("Login failed: " + err.message);
console.error(err);
});
}

/* SAVE SETTINGS (FIXED SILENT FAILURE) */
function saveSettings(){
db.collection("settings").doc("site").set({
storeName:get("storeName").value || "Junior Beats",
background:get("background").value || ""
})
.then(()=>{
get("settingsStatus").innerText="Saved ✔";
console.log("SETTINGS SAVED");
})
.catch(err=>{
alert("Settings error: " + err.message);
console.error(err);
});
}

/* ADD BEAT (FIXED FULL ERROR TRACKING) */
function addBeat(){

if(!get("title").value){
alert("Title missing");
return;
}

db.collection("beats").add({
title:get("title").value,
image:get("image").value,
previewFile:get("preview").value,
wavFile:get("wav").value,
buyLink:get("buyLink").value,
price:get("price").value,
createdAt:Date.now()
})
.then(()=>{
get("status").innerText="UPLOAD SUCCESS ✔";
console.log("BEAT ADDED");
})
.catch(err=>{
alert("Upload failed: " + err.message);
console.error(err);
});
}
</script>

</body>
</html>
