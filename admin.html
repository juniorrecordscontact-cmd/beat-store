<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

input {
  padding: 10px;
  margin: 6px;
  width: 260px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #00c853;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  margin: 5px;
}

#panel { display: none; }
</style>
</head>

<body>

<h1>🎛️ Admin Panel</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel">

  <h2>🎧 Upload Beats</h2>

  <input id="title" placeholder="Beat Title"><br>
  <input id="price" placeholder="Price"><br>
  <input id="file" placeholder="MP3 Link"><br>
  <input id="image" placeholder="Cover Image URL"><br>
  <input id="buyLink" placeholder="Buy Link"><br>

  <button onclick="addBeat()">Add Beat</button>

  <hr>

  <h2>🎨 Site Settings</h2>

  <input id="font" placeholder="Font (Arial, Courier...)"><br>
  <input id="background" placeholder="Background Image URL"><br>

  <button onclick="saveSettings()">Save Settings</button>

  <br><br>
  <button onclick="logout()">Logout</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
  authDomain: "junior-beats-store.firebaseapp.com",
  projectId: "junior-beats-store",
  storageBucket: "junior-beats-store.firebasestorage.app",
  messagingSenderId: "781170149321",
  appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(() => {
      loginBox.style.display = "none";
      panel.style.display = "block";
    })
    .catch(() => alert("Login failed ❌"));
}

/* LOGOUT */
function logout() {
  auth.signOut().then(() => location.reload());
}

/* KEEP SESSION */
auth.onAuthStateChanged(user => {
  if (user) {
    loginBox.style.display = "none";
    panel.style.display = "block";
  }
});

/* ADD BEAT */
function addBeat() {
  db.collection("beats").add({
    title: title.value,
    price: price.value,
    file: file.value,
    image: image.value,
    buyLink: buyLink.value
  });

  alert("Beat added 🎧");
}

/* SAVE SETTINGS */
function saveSettings() {
  db.collection("settings").doc("site").set({
    font: font.value,
    background: background.value
  });

  alert("Site updated 🎨");
}
</script>

</body>
</html>
