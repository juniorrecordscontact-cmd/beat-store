<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,select,button{padding:10px;margin:5px;width:300px;border-radius:6px;border:none;}
button{background:#00c853;color:white;cursor:pointer;}
.section{margin-top:25px;}
.beatRow{border:1px solid #333;margin:10px;padding:10px;}
.selected{border:2px solid #00c853;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin (Exclusive System)</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<div id="panel">

<div class="section">
<h2>🎧 Upload Exclusive Beat</h2>

<input id="title" placeholder="Title"><br>

<select id="genre">
<option>R&B</option>
<option>Pop</option>
<option>Trap</option>
<option>Drill</option>
<option>Afrobeats</option>
<option>Soul</option>
<option>Other</option>
</select><br>

<input id="image" placeholder="Cover Image URL"><br>
<input id="preview" placeholder="Preview (watermarked MP3 URL)"><br>
<input id="wav" placeholder="FULL WAV (exclusive) URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>

<input id="price" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">UPLOAD</button>
<button onclick="updateBeat()">UPDATE SELECTED</button>
<button onclick="markSold()">MARK AS SOLD</button>
<button onclick="deleteSelected()">DELETE</button>

<p id="status"></p>
</div>

<div class="section">
<h2>📀 Your Beats</h2>
<div id="beatList"></div>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let selectedId=null;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
loadBeats();
});
}

/* ADD */
function addBeat(){
db.collection("beats").add({
title:title.value,
genre:genre.value,
image:image.value,
previewFile:preview.value,
wavFile:wav.value,
buyLink:buyLink.value,
price:price.value,
status:"available",
createdAt:Date.now()
});
status.innerText="Uploaded ✔";
loadBeats();
}

/* UPDATE */
function updateBeat(){
if(!selectedId) return alert("Select a beat");

db.collection("beats").doc(selectedId).update({
title:title.value,
genre:genre.value,
image:image.value,
previewFile:preview.value,
wavFile:wav.value,
buyLink:buyLink.value,
price:price.value
});

status.innerText="Updated ✔";
loadBeats();
}

/* MARK SOLD */
function markSold(){
if(!selectedId) return alert("Select a beat");

db.collection("beats").doc(selectedId).update({
status:"sold"
});

status.innerText="Marked as SOLD ❌";
loadBeats();
}

/* DELETE */
function deleteSelected(){
if(!selectedId) return alert("Select a beat");

db.collection("beats").doc(selectedId).delete();
status.innerText="Deleted ✔";
loadBeats();
}

/* LOAD */
function loadBeats(){
beatList.innerHTML="";

db.collection("beats").get().then(snap=>{
snap.forEach(doc=>{
let b=doc.data();

beatList.innerHTML+=`
<div class="beatRow" id="row-${doc.id}">
<b>${b.title}</b> (${b.genre}) - ${b.status}<br>
<button onclick="selectBeat('${doc.id}','${b.title}','${b.genre}','${b.image}','${b.previewFile}','${b.wavFile}','${b.buyLink}','${b.price}')">SELECT</button>
</div>`;
});
});
}

/* SELECT */
function selectBeat(id,t,g,i,p,w,b,pr){
selectedId=id;

title.value=t;
genre.value=g;
image.value=i;
preview.value=p;
wav.value=w;
buyLink.value=b;
price.value=pr;

document.querySelectorAll(".beatRow").forEach(e=>e.classList.remove("selected"));
document.getElementById("row-"+id).classList.add("selected");
}
</script>

</body>
</html>
