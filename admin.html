<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border-radius:6px;border:none;}
button{background:#00c853;color:white;cursor:pointer;}
.section{margin-top:25px;}
.beatRow{border:1px solid #333;margin:10px;padding:10px;}
.selected{border:2px solid #00c853;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin PRO</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<div id="panel">

<div class="section">
<h2>🏪 Store Settings</h2>
<input id="storeName" placeholder="Store Name"><br>
<input id="background" placeholder="Background URL"><br>
<input id="font" placeholder="Font"><br>
<button onclick="saveSettings()">SAVE SETTINGS</button>
</div>

<div class="section">
<h2>🎧 Add / Edit Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="image" placeholder="Image URL"><br>
<input id="preview" placeholder="Preview URL"><br>
<input id="mp3" placeholder="MP3 URL"><br>
<input id="wav" placeholder="WAV URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>

<input id="mp3Price" placeholder="MP3 Price"><br>
<input id="wavPrice" placeholder="WAV Price"><br>
<input id="exclusivePrice" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">UPLOAD</button>
<button onclick="updateBeat()">UPDATE SELECTED</button>
<button onclick="deleteSelected()">DELETE SELECTED</button>

<p id="status"></p>
</div>

<div class="section">
<h2>📀 Your Beats</h2>
<div id="beatList"></div>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let selectedId=null;

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
loadBeats();
});
}

function saveSettings(){
db.collection("settings").doc("site").set({
storeName:storeName.value || "Junior Beats",
background:background.value || "",
font:font.value || "Arial"
});
}

function addBeat(){
db.collection("beats").add({
title:title.value,
image:image.value,
previewFile:preview.value,
mp3File:mp3.value,
wavFile:wav.value,
buyLink:buyLink.value,
prices:{
mp3:mp3Price.value,
wav:wavPrice.value,
exclusive:exclusivePrice.value
},
createdAt:Date.now()
});
status.innerText="Uploaded ✔";
loadBeats();
}

function updateBeat(){
if(!selectedId) return alert("Select a beat");

db.collection("beats").doc(selectedId).update({
title:title.value,
image:image.value,
previewFile:preview.value,
mp3File:mp3.value,
wavFile:wav.value,
buyLink:buyLink.value,
prices:{
mp3:mp3Price.value,
wav:wavPrice.value,
exclusive:exclusivePrice.value
}
});

status.innerText="Updated ✔";
loadBeats();
}

function deleteSelected(){
if(!selectedId) return alert("Select a beat");

db.collection("beats").doc(selectedId).delete();
status.innerText="Deleted ✔";
selectedId=null;
loadBeats();
}

function loadBeats(){
beatList.innerHTML="";
db.collection("beats").get().then(snap=>{
snap.forEach(doc=>{
let b=doc.data();
beatList.innerHTML+=`
<div class="beatRow" id="row-${doc.id}">
<b>${b.title}</b><br>
<button onclick="selectBeat('${doc.id}','${b.title}','${b.image}','${b.previewFile}','${b.mp3File}','${b.wavFile}','${b.buyLink}','${b.prices?.mp3}','${b.prices?.wav}','${b.prices?.exclusive}')">SELECT</button>
</div>`;
});
});
}

function selectBeat(id,t,i,p,m,w,b,mp,wp,ep){
selectedId=id;

title.value=t;
image.value=i;
preview.value=p;
mp3.value=m;
wav.value=w;
buyLink.value=b;

mp3Price.value=mp;
wavPrice.value=wp;
exclusivePrice.value=ep;

document.querySelectorAll(".beatRow").forEach(e=>e.classList.remove("selected"));
document.getElementById("row-"+id).classList.add("selected");
}
</script>

</body>
</html>
