<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Junior Beats</title>
</head>

<body style="font-family: Arial; background:#111; color:white; text-align:center;">

  <div id="loginBox">
    <h1>Admin Login 🔐</h1>

    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>

    <p id="error" style="color:red;"></p>
  </div>

  <div id="adminPanel" style="display:none;">
    <h1>Admin Panel 🎛️</h1>

    <input id="title" placeholder="Beat Name"><br><br>
    <input id="price" placeholder="Price"><br><br>
    <input id="file" placeholder="MP3 Link"><br><br>
    <input id="link" placeholder="PayPal Link"><br><br>

    <button onclick="addBeat()">Add Beat</button>
  </div>

  <script>
    const ADMIN_USER = "ADMIN";
    const ADMIN_PASS = "1234"; // change later if you want

    function login() {
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      if (u === ADMIN_USER && p === ADMIN_PASS) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
      } else {
        document.getElementById("error").innerText = "Wrong login ❌";
      }
    }

    function addBeat() {
      let beats = JSON.parse(localStorage.getItem("beats")) || [];

      beats.push({
        title: document.getElementById("title").value,
        price: document.getElementById("price").value,
        file: document.getElementById("file").value,
        buyLink: document.getElementById("link").value
      });

      localStorage.setItem("beats", JSON.stringify(beats));

      alert("Beat added!");
    }
  </script>

</body>
</html>
