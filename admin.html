<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel - FULL CONTROL</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
#panel{display:none;}
.log{font-size:12px;color:#ccc;margin-top:10px;}
</style>
</head>

<body>

<h1>🎛️ Admin Panel (DEBUG MODE)</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="panel">

<h2>UPLOAD BEAT</h2>

<input id="title" placeholder="Beat Title"><br>

<p>Cover Image</p>
<input type="file" id="imageFile"><br>

<p>Preview (Watermarked)</p>
<input type="file" id="previewFile"><br>

<p>MP3 Lease</p>
<input type="file" id="mp3File"><br>

<p>WAV Lease</p>
<input type="file" id="wavFile"><br>

<input id="buyLink" placeholder="PayPal Link"><br>

<input id="mp3" placeholder="MP3 Price"><br>
<input id="wav" placeholder="WAV Price"><br>
<input id="exclusive" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">UPLOAD</button>

<p id="status"></p>
<div id="debug" class="log"></div>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store",
storageBucket:"junior-beats-store.firebasestorage.app",
messagingSenderId:"781170149321",
appId:"1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

function log(msg){
debug.innerHTML += msg + "<br>";
}

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
})
.catch(e=>{
alert(e.message);
log("LOGIN ERROR: "+e.message);
});
}

/* SAFE UPLOAD */
async function upload(folder,file){

if(!file){
throw new Error("Missing file in " + folder);
}

log("Uploading "+folder+"...");

const ref = storage.ref(folder+"/"+Date.now()+"_"+file.name);

await ref.put(file);

const url = await ref.getDownloadURL();

log(folder+" uploaded ✅");

return url;
}

/* MAIN FUNCTION */
async function addBeat(){

debug.innerHTML = "";
status.innerText = "Starting...";

try{

/* VALIDATION */
if(!title.value) throw new Error("Missing title");
if(!buyLink.value) throw new Error("Missing PayPal link");

const image = imageFile.files[0];
const preview = previewFile.files[0];
const mp3 = mp3File.files[0];
const wav = wavFile.files[0];

if(!image) throw new Error("Missing IMAGE");
if(!preview) throw new Error("Missing PREVIEW");
if(!mp3) throw new Error("Missing MP3");
if(!wav) throw new Error("Missing WAV");

/* UPLOAD FILES */
status.innerText = "Uploading files...";

const imgURL = await upload("images", image);
const prevURL = await upload("preview", preview);
const mp3URL = await upload("mp3", mp3);
const wavURL = await upload("wav", wav);

/* SAVE DATABASE */
status.innerText = "Saving to database...";

await db.collection("beats").add({
title:title.value,
image:imgURL,
previewFile:prevURL,
mp3File:mp3URL,
wavFile:wavURL,
buyLink:buyLink.value,
exclusive:false,
createdAt:Date.now(),
licenses:{
mp3:mp3.value,
wav:wav.value,
exclusive:exclusive.value
}
});

status.innerText = "SUCCESS ✅";

}catch(e){

console.error(e);
status.innerText = "FAILED ❌";
log("ERROR: "+e.message);

}

}
</script>

</body>
</html>
