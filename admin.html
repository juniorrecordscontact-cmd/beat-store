<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Control Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:260px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
#panel{display:none;}

.beatBox{
background:#222;
padding:10px;
margin:10px auto;
width:320px;
border-radius:10px;
}
.smallBtn{
background:#ff5252;
margin-top:5px;
}
</style>
</head>

<body>

<h1>🎛️ FULL ADMIN CONTROL</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="panel">

<h2>🎧 Add / Edit Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="price" placeholder="Price"><br>
<input id="image" placeholder="Image URL"><br>
<input id="previewFile" placeholder="Preview MP3"><br>
<input id="fullFile" placeholder="Full MP3"><br>
<input id="buyLink" placeholder="Buy Link"><br>

<button onclick="addBeat()">Add Beat</button>

<hr>

<h2>🎨 Site Controls</h2>

<input id="font" placeholder="Font (Arial, Courier...)"><br>
<input id="bg" placeholder="Background Image URL"><br>

<button onclick="saveSettings()">Save Site Settings</button>

<hr>

<h2>📦 Your Beats (Delete Control)</h2>
<div id="list"></div>

<br>
<button onclick="logout()">Logout</button>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain: "junior-beats-store.firebaseapp.com",
projectId: "junior-beats-store",
storageBucket: "junior-beats-store.firebasestorage.app",
messagingSenderId: "781170149321",
appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{loginBox.style.display="none";panel.style.display="block";loadBeats();})
.catch(()=>alert("Login failed"));
}

/* LOGOUT */
function logout(){auth.signOut().then(()=>location.reload());}

/* ADD BEAT */
function addBeat(){
db.collection("beats").add({
title:title.value,
price:price.value,
image:image.value,
previewFile:previewFile.value,
fullFile:fullFile.value,
buyLink:buyLink.value
});
alert("Beat added 🎧");
loadBeats();
}

/* DELETE BEAT */
function deleteBeat(id){
db.collection("beats").doc(id).delete().then(()=>{
loadBeats();
});
}

/* LOAD BEATS */
function loadBeats(){
db.collection("beats").get().then(snap=>{
list.innerHTML="";

snap.forEach(doc=>{
let b=doc.data();

list.innerHTML+=`
<div class="beatBox">
<b>${b.title}</b><br>
${b.price}<br><br>

<button class="smallBtn" onclick="deleteBeat('${doc.id}')">
Delete
</button>
</div>`;
});
});
}

/* SITE SETTINGS */
function saveSettings(){
db.collection("settings").doc("site").set({
font:font.value,
background:bg.value
});
alert("Site updated 🎨");
}

/* SESSION */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
panel.style.display="block";
loadBeats();
}
});
</script>

</body>
</html>
