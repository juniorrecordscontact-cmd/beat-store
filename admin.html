<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FULL CONTROL ADMIN SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button,textarea{padding:10px;margin:5px;width:300px;border-radius:6px;border:none;}
button{background:#00c853;color:white;cursor:pointer;}
.section{border-top:1px solid #333;margin-top:25px;padding-top:20px;}
#panel{display:none;}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<h1>🎛 FULL ADMIN CONTROL SYSTEM</h1>

<!-- LOGIN -->
<div id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<div id="panel">

<!-- STORE SETTINGS -->
<div class="section">
<h2>🏪 Store Settings</h2>

<input id="storeName" placeholder="Store Name"><br>
<input id="font" placeholder="Font (Arial, Courier, etc)"><br>
<input id="background" placeholder="Background Image URL"><br>

<button onclick="saveSettings()">SAVE SITE SETTINGS</button>
<p id="settingsStatus"></p>
</div>

<!-- ADD BEAT -->
<div class="section">
<h2>🎧 Add Beat</h2>

<input id="title" placeholder="Beat Title"><br>

<input id="image" placeholder="Cover Image URL"><br>
<input id="preview" placeholder="Preview MP3 URL (watermarked)"><br>
<input id="mp3" placeholder="MP3 Download URL"><br>
<input id="wav" placeholder="WAV Download URL"><br>

<input id="buyLink" placeholder="PayPal Link"><br>

<input id="mp3Price" placeholder="MP3 Price"><br>
<input id="wavPrice" placeholder="WAV Price"><br>
<input id="exclusivePrice" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">ADD BEAT</button>

<p id="status"></p>
</div>

<!-- EDIT BEATS -->
<div class="section">
<h2>✏ Edit Beat Price</h2>

<input id="editId" placeholder="Beat ID"><br>
<input id="newMp3" placeholder="New MP3 Price"><br>
<input id="newWav" placeholder="New WAV Price"><br>

<button onclick="updatePrice()">UPDATE PRICE</button>
</div>

<!-- DELETE BEATS -->
<div class="section">
<h2>🗑 Delete Beat</h2>

<input id="deleteId" placeholder="Beat ID"><br>
<button onclick="deleteBeat()">DELETE BEAT</button>
</div>

<!-- DEBUG -->
<div class="section">
<h2>📊 System Logs</h2>
<pre id="log" class="small"></pre>
</div>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store",
storageBucket:"junior-beats-store.firebasestorage.app",
messagingSenderId:"781170149321",
appId:"1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
panel.style.display="block";
})
.catch(e=>alert(e.message));
}

/* ADD BEAT */
function addBeat(){

if(!title.value || !image.value || !preview.value || !mp3.value || !wav.value){
status.innerText="Missing fields ❌";
return;
}

db.collection("beats").add({
title:title.value,
image:image.value,
previewFile:preview.value,
mp3File:mp3.value,
wavFile:wav.value,
buyLink:buyLink.value,
prices:{
mp3:mp3Price.value,
wav:wavPrice.value,
exclusive:exclusivePrice.value
},
createdAt:Date.now()
});

status.innerText="BEAT ADDED ✔";
}

/* UPDATE PRICE */
function updatePrice(){

db.collection("beats").doc(editId.value).update({
"prices.mp3":newMp3.value,
"prices.wav":newWav.value
});

alert("UPDATED ✔");
}

/* DELETE */
function deleteBeat(){
db.collection("beats").doc(deleteId.value).delete();
alert("DELETED ✔");
}

/* SAVE SETTINGS */
function saveSettings(){

db.collection("settings").doc("site").set({
storeName:storeName.value,
font:font.value,
background:background.value
});

settingsStatus.innerText="SETTINGS SAVED ✔";
}
</script>

</body>
</html>
