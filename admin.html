<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:260px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
#panel{display:none;}
.beatBox{background:#222;padding:10px;margin:10px auto;width:320px;border-radius:10px;}
.deleteBtn{background:#ff5252;}
</style>
</head>

<body>

<h1>🎛️ Admin Panel</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="panel">

<h2>🎧 Upload Beat</h2>

<input id="title" placeholder="Title"><br>

<label>🎨 Cover Image</label><br>
<input type="file" id="imageFile"><br>

<label>🎧 Preview (Watermarked)</label><br>
<input type="file" id="previewFile"><br>

<label>💎 Full File</label><br>
<input type="file" id="fullFile"><br>

<input id="buyLink" placeholder="PayPal Link"><br>

<h3>💰 Pricing</h3>
<input id="mp3" placeholder="MP3 Price"><br>
<input id="wav" placeholder="WAV Price"><br>
<input id="exclusive" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">Upload Beat</button>

<hr>

<h2>📦 Your Beats</h2>
<div id="list"></div>

<br>
<button onclick="logout()">Logout</button>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain: "junior-beats-store.firebaseapp.com",
projectId: "junior-beats-store",
storageBucket: "junior-beats-store.firebasestorage.app",
messagingSenderId: "781170149321",
appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{loginBox.style.display="none";panel.style.display="block";loadBeats();})
.catch(()=>alert("Login failed"));
}

/* LOGOUT */
function logout(){auth.signOut().then(()=>location.reload());}

/* UPLOAD SYSTEM */
async function addBeat(){

const image = imageFile.files[0];
const preview = previewFile.files[0];
const full = fullFile.files[0];

if(!image || !preview || !full){
return alert("Upload ALL files");
}

try{

// unique names
const id = Date.now();

const imgRef = storage.ref("images/"+id+"_"+image.name);
await imgRef.put(image);
const imgURL = await imgRef.getDownloadURL();

const prevRef = storage.ref("previews/"+id+"_"+preview.name);
await prevRef.put(preview);
const prevURL = await prevRef.getDownloadURL();

const fullRef = storage.ref("full/"+id+"_"+full.name);
await fullRef.put(full);
const fullURL = await fullRef.getDownloadURL();

// save beat
await db.collection("beats").add({
title:title.value,
image:imgURL,
previewFile:prevURL,
fullFile:fullURL,
buyLink:buyLink.value,
licenses:{
mp3:mp3.value,
wav:wav.value,
exclusive:exclusive.value
}
});

alert("Beat uploaded 🔥");
loadBeats();

}catch(e){
alert("Upload failed: "+e);
}
}

/* DELETE */
function deleteBeat(id){
db.collection("beats").doc(id).delete().then(loadBeats);
}

/* LOAD */
function loadBeats(){
db.collection("beats").get().then(snap=>{
list.innerHTML="";
snap.forEach(doc=>{
let b=doc.data();
list.innerHTML+=`
<div class="beatBox">
<b>${b.title}</b><br>
<button class="deleteBtn" onclick="deleteBeat('${doc.id}')">Delete</button>
</div>`;
});
});
}

/* SESSION */
auth.onAuthStateChanged(u=>{
if(u){
loginBox.style.display="none";
panel.style.display="block";
loadBeats();
}
});
</script>

</body>
</html>
