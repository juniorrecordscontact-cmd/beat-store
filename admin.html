<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:280px;border-radius:6px;border:none;}
button{background:#00c853;color:white;cursor:pointer;}
.section{margin-top:20px;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin</h1>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="loginBtn">LOGIN</button>
</div>

<!-- PANEL -->
<div id="panel">

<div class="section">
<h2>Add Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="image" placeholder="Image URL"><br>
<input id="preview" placeholder="Preview URL"><br>

<button id="addBtn">ADD BEAT</button>

<p id="status"></p>
</div>

<div class="section">
<h2>Settings</h2>

<input id="storeName" placeholder="Store Name"><br>

<button id="saveBtn">SAVE SETTINGS</button>

<p id="settingsStatus"></p>
</div>

</div>

<script>
/* ================= BASIC TEST ================= */
console.log("JS LOADED");
alert("Admin loaded");

/* ================= FIREBASE ================= */
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= SAFE GET ================= */
function get(id){
return document.getElementById(id);
}

/* ================= CONNECT BUTTONS MANUALLY ================= */
document.getElementById("loginBtn").addEventListener("click", async () => {

alert("LOGIN CLICKED");

try{
await auth.signInWithEmailAndPassword(
get("email").value,
get("password").value
);

get("loginBox").style.display="none";
get("panel").style.display="block";

alert("LOGIN SUCCESS");

}catch(e){
alert(e.message);
}

});

/* ADD BEAT BUTTON */
document.getElementById("addBtn").addEventListener("click", async () => {

alert("ADD CLICKED");

try{

await db.collection("beats").add({
title:get("title").value,
image:get("image").value,
previewFile:get("preview").value
});

get("status").innerText="Beat Added ✔";

}catch(e){
get("status").innerText="Error: "+e.message;
}

});

/* SAVE SETTINGS BUTTON */
document.getElementById("saveBtn").addEventListener("click", async () => {

alert("SAVE CLICKED");

try{

await db.collection("settings").doc("site").set({
storeName:get("storeName").value || "Junior Beats"
});

get("settingsStatus").innerText="Saved ✔";

}catch(e){
get("settingsStatus").innerText="Error: "+e.message;
}

});
</script>

</body>
</html>
