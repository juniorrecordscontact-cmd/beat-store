<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:5px;width:300px;border-radius:6px;border:none;}
button{background:#00c853;color:white;cursor:pointer;}
.section{border-top:1px solid #333;margin-top:25px;padding-top:20px;}
#panel{display:none;}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<h1>🎛 Junior Beats Admin</h1>

<!-- LOGIN -->
<div id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>
</div>

<div id="panel">

<!-- STORE SETTINGS -->
<div class="section">
<h2>🏪 Store Settings</h2>

<input id="storeName" placeholder="Store Name"><br>
<input id="font" placeholder="Font (Arial, Courier, etc)"><br>
<input id="background" placeholder="Background Image URL"><br>

<button onclick="saveSettings()">SAVE SITE SETTINGS</button>
<p id="settingsStatus"></p>
</div>

<!-- ADD BEAT -->
<div class="section">
<h2>🎧 Add Beat</h2>

<input id="title" placeholder="Beat Title"><br>

<input id="image" placeholder="Cover Image URL"><br>
<input id="preview" placeholder="Preview MP3 URL"><br>
<input id="mp3" placeholder="MP3 Download URL"><br>
<input id="wav" placeholder="WAV Download URL"><br>

<input id="buyLink" placeholder="PayPal Link"><br>

<input id="mp3Price" placeholder="MP3 Price"><br>
<input id="wavPrice" placeholder="WAV Price"><br>
<input id="exclusivePrice" placeholder="Exclusive Price"><br>

<button onclick="addBeat()">ADD BEAT</button>

<p id="status"></p>
</div>

<!-- EDIT BEATS -->
<div class="section">
<h2>✏ Edit Beat Price</h2>

<input id="editId" placeholder="Beat ID"><br>
<input id="newMp3" placeholder="New MP3 Price"><br>
<input id="newWav" placeholder="New WAV Price"><br>

<button onclick="updatePrice()">UPDATE PRICE</button>
</div>

<!-- DELETE BEATS -->
<div class="section">
<h2>🗑 Delete Beat</h2>

<input id="deleteId" placeholder="Beat ID"><br>
<button onclick="deleteBeat()">DELETE BEAT</button>
</div>

<!-- DEBUG LOG -->
<div class="section">
<h2>📊 System Logs</h2>
<pre id="log" class="small"></pre>
</div>

</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store",
storageBucket:"junior-beats-store.firebasestorage.app",
messagingSenderId:"781170149321",
appId:"1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= HELPERS ================= */
function get(id){
return document.getElementById(id);
}

function log(msg){
const box = get("log");
if(box) box.innerHTML += msg + "\n";
}

/* ================= LOGIN ================= */
window.login = async function(){
try{
await auth.signInWithEmailAndPassword(
get("email").value,
get("password").value
);

get("loginBox").style.display="none";
get("panel").style.display="block";

log("Login success ✔");

}catch(e){
alert(e.message);
log("Login error: " + e.message);
}
}

/* ================= ADD BEAT ================= */
window.addBeat = async function(){
try{

const title = get("title").value;
const image = get("image").value;
const preview = get("preview").value;

if(!title || !image || !preview){
get("status").innerText="Missing required fields ❌";
return;
}

await db.collection("beats").add({
title:title,
image:image,
previewFile:preview,
mp3File:get("mp3").value || "",
wavFile:get("wav").value || "",
buyLink:get("buyLink").value || "",
prices:{
mp3:get("mp3Price").value || "0",
wav:get("wavPrice").value || "0",
exclusive:get("exclusivePrice").value || "0"
},
createdAt:Date.now()
});

get("status").innerText="BEAT ADDED ✔";
log("Beat added ✔");

}catch(e){
get("status").innerText="Error ❌";
log("Add beat error: " + e.message);
}
}

/* ================= UPDATE ================= */
window.updatePrice = async function(){
try{

await db.collection("beats").doc(get("editId").value).update({
"prices.mp3":get("newMp3").value,
"prices.wav":get("newWav").value
});

alert("UPDATED ✔");
log("Price updated ✔");

}catch(e){
log("Update error: " + e.message);
}
}

/* ================= DELETE ================= */
window.deleteBeat = async function(){
try{

await db.collection("beats").doc(get("deleteId").value).delete();

alert("DELETED ✔");
log("Beat deleted ✔");

}catch(e){
log("Delete error: " + e.message);
}
}

/* ================= SETTINGS ================= */
window.saveSettings = async function(){
try{

await db.collection("settings").doc("site").set({
storeName:get("storeName").value || "Junior Beats",
font:get("font").value || "Arial",
background:get("background").value || ""
});

get("settingsStatus").innerText="SETTINGS SAVED ✔";
log("Settings updated ✔");

}catch(e){
get("settingsStatus").innerText="Error ❌";
log("Settings error: " + e.message);
}
}
</script>

</body>
</html>
