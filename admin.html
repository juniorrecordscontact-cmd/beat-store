<!DOCTYPE html>
<html>
<head>
  <title>Admin - Junior Beats</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 6px;
      width: 260px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #00c853;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>🎛️ Admin Panel</h1>

<input id="title" placeholder="Beat Name"><br>
<input id="price" placeholder="Price"><br>
<input id="file" placeholder="MP3 Link"><br>
<input id="image" placeholder="Cover Image URL"><br>
<input id="buyLink" placeholder="PayPal Link"><br>

<button onclick="addBeat()">Add Beat</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
    authDomain: "junior-beats-store.firebaseapp.com",
    projectId: "junior-beats-store",
    storageBucket: "junior-beats-store.firebasestorage.app",
    messagingSenderId: "781170149321",
    appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addBeat() {
    db.collection("beats").add({
      title: title.value,
      price: price.value,
      file: file.value,
      image: image.value,
      buyLink: buyLink.value
    });

    alert("Beat added successfully 🎧");
  }
</script>

</body>
</html>
