<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
input,button{padding:10px;margin:6px;width:260px;border:none;border-radius:6px;}
button{background:#00c853;color:white;cursor:pointer;}
#panel{display:none;}
</style>
</head>

<body>

<h1>🎛️ Admin Panel</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="panel">

<h2>🎧 Add Beat</h2>

<input id="title" placeholder="Title"><br>
<input id="price" placeholder="Price"><br>
<input id="image" placeholder="Beat Image URL"><br>
<input id="previewFile" placeholder="Preview MP3"><br>
<input id="fullFile" placeholder="Full MP3"><br>
<input id="buyLink" placeholder="PayPal Link"><br>

<button onclick="addBeat()">Add Beat</button>

<hr>

<h2>🎨 Site Background</h2>
<input id="bg" placeholder="Background Image URL"><br>
<button onclick="saveBG()">Save Background</button>

<br><br>
<button onclick="logout()">Logout</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
  authDomain: "junior-beats-store.firebaseapp.com",
  projectId: "junior-beats-store",
  storageBucket: "junior-beats-store.firebasestorage.app",
  messagingSenderId: "781170149321",
  appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{loginBox.style.display="none";panel.style.display="block";})
.catch(()=>alert("Login failed"));
}

/* LOGOUT */
function logout(){auth.signOut().then(()=>location.reload());}

/* ADD BEAT */
function addBeat(){
db.collection("beats").add({
title:title.value,
price:price.value,
image:image.value,
previewFile:previewFile.value,
fullFile:fullFile.value,
buyLink:buyLink.value
});
alert("Beat added 🎧");
}

/* SAVE BACKGROUND */
function saveBG(){
db.collection("settings").doc("site").set({
background:bg.value
});
alert("Background updated 🎨");
}

/* SESSION */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
panel.style.display="block";
}
});
</script>

</body>
</html>
