<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Junior Beats Store</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .beat {
      background: #1e1e1e;
      width: 280px;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
    }

    .beat img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #00c853;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🔥 Junior Beats Store</h1>
<p>by Jayan Reid</p>

<div class="container" id="beat-container"></div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
    authDomain: "junior-beats-store.firebaseapp.com",
    projectId: "junior-beats-store",
    storageBucket: "junior-beats-store.firebasestorage.app",
    messagingSenderId: "781170149321",
    appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const container = document.getElementById("beat-container");

  function loadBeats() {
    db.collection("beats").get().then(snapshot => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const beat = doc.data();

        container.innerHTML += `
          <div class="beat">

            <img src="${beat.image || ''}" alt="cover">

            <h3>${beat.title || 'No Title'}</h3>
            <p>${beat.price || ''}</p>

            <audio controls style="width:100%;">
              <source src="${beat.file || ''}" type="audio/mpeg">
            </audio>

            <button onclick="window.open('${beat.buyLink || '#'}', '_blank')">
              Buy Now
            </button>

          </div>
        `;
      });
    });
  }

  loadBeats();
</script>

</body>
</html>
