<script>
function buyBeat(id, title, price, paypalLink){

// ask for email (needed for license delivery)
const email = prompt("Enter your email for license delivery:");

if(!email){
alert("Email required for license");
return;
}

// create purchase record in Firebase
db.collection("purchases").add({
beatId: id,
email: email,
beatTitle: title,
amount: price,
status: "pending",
createdAt: Date.now()
}).then(() => {

// redirect to PayPal AFTER saving purchase
window.open(paypalLink, "_blank");

alert("Purchase started ✔ Check your email after payment.");
});
}
</script>
