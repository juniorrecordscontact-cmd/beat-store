<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
padding:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.beat{
width:280px;
height:320px;
border-radius:12px;
overflow:hidden;
position:relative;
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.content{
position:absolute;
bottom:10px;
width:100%;
}

button{
padding:8px;
width:80%;
background:#00c853;
border:none;
color:white;
cursor:pointer;
}

.error{
color:red;
margin-top:20px;
}
</style>
</head>

<body>

<h1 id="title">Junior Beats</h1>

<div class="container" id="box"></div>
<p id="errorBox" class="error"></p>

<script>

// 🔥 FIREBASE INIT
firebase.initializeApp({
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
});

const db = firebase.firestore();

const box = document.getElementById("box");
const errorBox = document.getElementById("errorBox");

// 🧠 SAFE VALUE
function safe(v, fallback=""){
return (v !== undefined && v !== null) ? v : fallback;
}

// 💰 SAFE PRICE
function safePrice(v){
let num = parseFloat(v);
return isNaN(num) ? 0 : num;
}

// 🚀 BUY SYSTEM (FULL FLOW)
function buyBeat(id, title, price, link){

try{

const email = prompt("Enter your email (this is where your license will be sent):");

if(!email){
alert("Email is required to receive your beat.");
return;
}

// SAVE PURCHASE
db.collection("purchases").add({
beatId: id,
email: email,
beatTitle: title,
amount: safePrice(price),
status: "pending",
createdAt: Date.now()
}).then(()=>{

alert(
"✅ Purchase Started!\n\n" +
"1. Complete your payment on PayPal\n" +
"2. Your exclusive WAV + license will be sent to your email after payment confirmation."
);

// OPEN PAYPAL
window.open(link, "_blank");

});

}catch(err){
console.error(err);
alert("Something went wrong. Try again.");
}

}

// 🎨 LOAD SETTINGS
function loadSettings(){
db.collection("settings").doc("site").get()
.then(doc=>{
if(doc.exists){

let s = doc.data();

if(s.storeName){
document.getElementById("title").innerText = s.storeName;
}

if(s.background){
document.body.style.backgroundImage = `url('${s.background}')`;
}

if(s.font){
document.body.style.fontFamily = s.font;
}

}
})
.catch(err=>{
console.error(err);
});
}

// 🎧 LOAD BEATS
function loadBeats(){

db.collection("beats").get()
.then(snapshot=>{

box.innerHTML = "";

snapshot.forEach(doc=>{

let b = doc.data();
let id = doc.id;

// SAFE DATA
let title = safe(b.title, "Untitled");
let image = safe(b.image, "");
let bgColor = safe(b.bgColor, "#000");
let preview = safe(b.previewFile, "");
let price = safePrice(b.price);
let link = safe(b.buyLink, "#");

// CREATE CARD
let div = document.createElement("div");
div.className = "beat";

div.style.backgroundImage = image ? `url('${image}')` : "none";
div.style.backgroundColor = bgColor;

// CONTENT
div.innerHTML = `
<div class="overlay"></div>

<div class="content">
<h3>${title}</h3>

<audio controls style="width:90%">
<source src="${preview}">
</audio>

<p>$${price}</p>

<button>BUY</button>
</div>
`;

// SAFE BUTTON BIND
div.querySelector("button").onclick = function(){
buyBeat(id, title, price, link);
};

box.appendChild(div);

});

})
.catch(err=>{
console.error(err);
errorBox.innerText = "Error loading beats: " + err.message;
});

}

// 🚀 INIT
loadSettings();
loadBeats();

</script>

</body>
</html>
