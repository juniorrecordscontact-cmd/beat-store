<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats Store</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.beat {
  width: 280px;
  height: 280px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  background-size: cover;
  background-position: center;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
}

.info {
  position: absolute;
  bottom: 15px;
  width: 100%;
}

button {
  padding: 10px;
  width: 80%;
  border: none;
  background: #00c853;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🔥 Junior Beats Store</h1>

<div class="container" id="beat-container"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
  authDomain: "junior-beats-store.firebaseapp.com",
  projectId: "junior-beats-store",
  storageBucket: "junior-beats-store.firebasestorage.app",
  messagingSenderId: "781170149321",
  appId: "1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const container = document.getElementById("beat-container");

function loadSettings() {
  db.collection("settings").doc("site").get().then(doc => {
    const data = doc.data();
    if (!data) return;

    if (data.font) document.body.style.fontFamily = data.font;

    if (data.background) {
      document.body.style.backgroundImage = `url('${data.background}')`;
      document.body.style.backgroundSize = "cover";
    }
  });
}

function loadBeats() {
  db.collection("beats").get().then(snapshot => {
    container.innerHTML = "";

    snapshot.forEach(doc => {
      const beat = doc.data();

      const div = document.createElement("div");
      div.className = "beat";
      div.style.backgroundImage =
        `url('${beat.image || "https://images.unsplash.com/photo-1521335629791-ce4aec67dd49"}')`;

      div.innerHTML = `
        <div class="overlay"></div>

        <div class="info">
          <h3>${beat.title}</h3>
          <p>${beat.price}</p>

          <audio controls style="width:90%;">
            <source src="${beat.file}" type="audio/mpeg">
          </audio>

          <button onclick="window.open('${beat.buyLink}', '_blank')">
            Buy Now
          </button>
        </div>
      `;

      container.appendChild(div);
    });
  });
}

loadSettings();
loadBeats();
</script>

</body>
</html>
