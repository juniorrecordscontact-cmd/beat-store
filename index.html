<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beat Store</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;text-align:center;}
.beat{margin:20px;padding:10px;border:1px solid #333;}
img{width:200px;}
button{padding:8px;background:#00c853;border:none;color:white;cursor:pointer;}
</style>
</head>

<body>

<h1>Beat Store</h1>
<div id="box"></div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store",
storageBucket:"junior-beats-store.firebasestorage.app",
messagingSenderId:"781170149321",
appId:"1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function load(){
db.collection("beats").get().then(snap=>{
box.innerHTML="";
snap.forEach(doc=>{
let b = doc.data();

box.innerHTML += `
<div class="beat">
<h3>${b.title}</h3>
<img src="${b.image}">
<br>
<audio controls src="${b.previewFile}"></audio>
<br>
<button onclick="window.open('${b.buyLink}','_blank')">BUY</button>
</div>`;
});
});
}

load();
</script>

</body>
</html>
