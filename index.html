<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Junior Beats</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;text-align:center;}
h1{padding:20px;}
.container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.beat{width:280px;height:320px;background-size:cover;position:relative;border-radius:12px;overflow:hidden;}
.overlay{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.content{position:absolute;bottom:10px;width:100%;}
button{padding:8px;width:80%;background:#00c853;border:none;color:white;}
</style>
</head>

<body>

<h1 id="title">Junior Beats</h1>

<div class="container" id="box"></div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store"
});

const db=firebase.firestore();
const box=document.getElementById("box");

/* SETTINGS */
db.collection("settings").doc("site").get().then(doc=>{
if(doc.exists){
let s=doc.data();
if(s.storeName) title.innerText=s.storeName;
if(s.background) document.body.style.backgroundImage=`url('${s.background}')`;
if(s.font) document.body.style.fontFamily=s.font;
}
});

/* SAFE PRICE DISPLAY */
function safePrice(p){
let n = parseFloat(p);
return isNaN(n) ? 0 : n;
}

/* LOAD BEATS */
db.collection("beats").get().then(snap=>{
snap.forEach(doc=>{
let b = doc.data();

box.innerHTML += `
<div class="beat" style="
background-image:url('${b.image || ""}');
background-color:${b.bgColor || "#000"};
">

<div class="overlay"></div>

<div class="content">
<h3>${b.title || "Untitled"}</h3>

<audio controls style="width:90%">
<source src="${b.previewFile || ""}">
</audio>

<p>Exclusive WAV - $${safePrice(b.price)}</p>

<button onclick="window.open('${b.buyLink || "#"}')">
BUY
</button>

</div>
</div>`;
});
});
</script>

</body>
</html>
