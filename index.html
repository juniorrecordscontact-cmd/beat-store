<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beat Store</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
background-size:cover;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.beat{
width:280px;
height:320px;
background-size:cover;
background-position:center;
border-radius:12px;
position:relative;
overflow:hidden;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.info{
position:absolute;
bottom:10px;
width:100%;
}

button{
padding:8px;
width:80%;
border:none;
background:#00c853;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h1 id="storeTitle">Loading...</h1>
<div class="container" id="box"></div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyD2y_gXSvYFe4OIXkns2Euwcgk73DV83fw",
authDomain:"junior-beats-store.firebaseapp.com",
projectId:"junior-beats-store",
storageBucket:"junior-beats-store.firebasestorage.app",
messagingSenderId:"781170149321",
appId:"1:781170149321:web:b1f1e2dd17d3b0f86bca18"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

/* LOAD SETTINGS */
db.collection("settings").doc("site").get().then(doc=>{
let s=doc.data();

if(s){
storeTitle.innerText = s.storeName || "Beat Store";

if(s.background){
document.body.style.backgroundImage=`url('${s.background}')`;
}

if(s.font){
document.body.style.fontFamily=s.font;
}
}
});

/* LOAD BEATS */
db.collection("beats").get().then(snap=>{
snap.forEach(doc=>{
let b=doc.data();

box.innerHTML+=`
<div class="beat" style="background-image:url('${b.image}')">
<div class="overlay"></div>

<div class="info">
<h3>${b.title}</h3>

<audio controls style="width:90%">
<source src="${b.previewFile}">
</audio>

<p>
MP3 $${b.licenses?.mp3 || ""} |
WAV $${b.licenses?.wav || ""} |
EX $${b.licenses?.exclusive || ""}
</p>

<button onclick="window.open('${b.buyLink}','_blank')">
BUY
</button>

</div>
</div>`;
});
});
</script>

</body>
</html>
